<!DOCTYPE html>
<html>
<head>
    <title>E-Commerce Store</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f4; padding: 20px; }
        h1 { color: #333; margin: 20px; }
        .products { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; padding: 20px; }
        .product { background: white; border-radius: 10px; padding: 20px; width: 200px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .product img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; }
        .product h2 { font-size: 18px; margin: 10px 0; }
        .product p { color: #e44d26; font-weight: bold; font-size: 16px; }
        .product button { background-color: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 14px; }
        .product button:hover { background-color: #218838; }
        .cart { background: white; margin: 20px auto; padding: 20px; width: 90%; max-width: 400px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .cart ul { list-style: none; padding: 0; }
        .cart ul li { padding: 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .cart button { background-color: #28a745; color: white; border: none; padding: 10px 30px; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>

<h1>My E-Commerce Store</h1>

<div class="products">
    <div class="product">
        <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=200" alt="Phone">
        <h2>Smart Phone</h2>
        <p>₹15000</p>
        <button onclick="addToCart('Smart Phone', 15000)">Add to Cart</button>
    </div>
    <div class="product">
        <img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=200" alt="Laptop">
        <h2>Laptop</h2>
        <p>₹45000</p>
        <button onclick="addToCart('Laptop', 45000)">Add to Cart</button>
    </div>
    <div class="product">
        <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=200" alt="Headphone">
        <h2>Headphone</h2>
        <p>₹2000</p>
        <button onclick="addToCart('Headphone', 2000)">Add to Cart</button>
    </div>
</div>

<div class="cart">
    <h2>Shopping Cart</h2>
    <ul id="cartItems"></ul>
    <h3 id="total">Total: ₹0</h3>
    <button onclick="checkout()">Checkout</button>
</div>

<script>
let cart = [];
let total = 0;

function addToCart(name, price) {
    cart.push({ name, price });
    total += price;
    updateCart();
}

function updateCart() {
    const cartItems = document.getElementById('cartItems');
    const totalDisplay = document.getElementById('total');
    cartItems.innerHTML = '';
    cart.forEach(function(item, index) {
        const li = document.createElement('li');
        li.innerHTML = item.name + ' - ₹' + item.price + ' <button onclick="removeItem(' + index + ')">❌</button>';
        cartItems.appendChild(li);
    });
    totalDisplay.textContent = 'Total: ₹' + total;
}

function removeItem(index) {
    total -= cart[index].price;
    cart.splice(index, 1);
    updateCart();
}

function checkout() {
    if (cart.length === 0) {
        alert('Cart empty! Products add pannunga!');
    } else {
        alert('Order placed! Total: ₹' + total);
        cart = [];
        total = 0;
        updateCart();
    }
}
</script>

</body>
</html>
